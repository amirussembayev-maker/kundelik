name: Kundelik Reports

permissions:
  contents: read
  pages: write
  id-token: write

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-kundelik.txt

      - name: Build parent reports site
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_JSON }}
          BASE_URL: ${{ vars.BASE_URL }}
          REGISTRY_SPREADSHEET_ID: ${{ vars.REGISTRY_SPREADSHEET_ID }}
          REGISTRY_SHEET_NAMES: ${{ vars.REGISTRY_SHEET_NAMES }}
          ERRORS_SHEET_NAME: ${{ vars.ERRORS_SHEET_NAME }}
          GRADE_SOURCE_SPREADSHEET_IDS: ${{ vars.GRADE_SOURCE_SPREADSHEET_IDS }}
          ATTENDANCE_SOURCE_SPREADSHEET_IDS: ${{ vars.ATTENDANCE_SOURCE_SPREADSHEET_IDS }}
          GRADE_SHEET_EXCLUDE: ${{ vars.GRADE_SHEET_EXCLUDE }}
          ATTENDANCE_SHEET_EXCLUDE: ${{ vars.ATTENDANCE_SHEET_EXCLUDE }}
          REPORT_TIMEZONE: Asia/Almaty
          OUTPUT_DIR: parent_site
        run: python kundelik_reports.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: parent_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
